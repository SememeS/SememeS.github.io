<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <!-- FontAwesome for the return icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0c0c0c; /* Nearly black */
            --watermark-color: rgba(255, 255, 255, 0.1); /* Very low opacity white */
            --icon-color: #ffffff; /* Solid white */
            --icon-hover: rgba(255, 255, 255, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents scrollbars from appearing */
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Center section holding the 404 */
        .card-center {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 404 Watermark Styling */
        .watermark {
            font-size: 45vmin; /* Dynamically scales with the screen size */
            font-weight: bold;
            color: var(--watermark-color);
            user-select: none; /* Prevents accidental highlighting */
            cursor: default;
            letter-spacing: -2px; /* Pulls the numbers slightly closer together */
        }

        /* Bottom Footer Area */
        .card-footer {
            width: 100%;
            padding-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* Return Icon Link Styling */
        .return-link a {
            color: var(--icon-color);
            font-size: 40px; /* Medium size */
            text-decoration: none;
            transition: color 0.3s ease, transform 0.3s ease;
            display: inline-block;
        }

        .return-link a:hover {
            color: var(--icon-hover);
            transform: scale(1.1); /* Slight grow effect on hover */
        }
    </style>
</head>
<body>

    <main class="card-center">
        <!-- Background 404 text -->
        <div class="watermark">404</div>
    </main>

    <footer class="card-footer">
        <!-- Return Link -->
        <div class="return-link">
            <a href="https://steveseverdija.com" aria-label="Return to Homepage">
                <i class="fa-solid fa-arrow-rotate-left"></i>
            </a>
        </div>
    </footer>

</body>
</html>
