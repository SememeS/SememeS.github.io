<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card</title>
    <!-- FontAwesome for GitHub and Mail icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0c0c0c; /* Nearly black */
            --kanji-color: rgba(255, 255, 255, 0.04); /* Very low opacity white */
            --line-color: rgba(255, 255, 255, 0.15); /* Thin, low opacity white line */
            --icon-color: rgba(255, 255, 255, 0.6);
            --icon-hover: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents scrollbars from appearing */
        }

        /* Center section holding the kanji */
        .card-center {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Dragon Kanji Styling */
        .kanji-watermark {
            font-size: 45vmin; /* Dynamically scales with the screen size */
            color: var(--kanji-color);
            user-select: none; /* Prevents accidental highlighting */
            cursor: default;
            /* Using standard serif fonts that render kanji elegantly */
            font-family: "Yu Mincho", "MS Mincho", "SimSun", serif; 
        }

        /* Bottom Footer Area */
        .card-footer {
            width: 100%;
            padding-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* The Divider Line */
        .divider {
            width: 80%;
            max-width: 500px;
            height: 1px;
            background-color: var(--line-color);
            margin-bottom: 30px;
        }

        /* Icon Container */
        .social-links {
            display: flex;
            gap: 50px;
        }

        /* Icon Styling and Animation */
        .social-links a {
            color: var(--icon-color);
            font-size: 28px;
            text-decoration: none;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .social-links a:hover {
            color: var(--icon-hover);
            transform: translateY(-4px); /* Slight lift effect on hover */
        }
    </style>
</head>
<body>

    <main class="card-center">
        <!-- Traditional Kanji for Dragon -->
        <div class="kanji-watermark">龍</div>
    </main>

    <footer class="card-footer">
        <div class="divider"></div>
        <div class="social-links">
            <a href="https://github.com/SememeS" target="_blank" aria-label="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="mailto:steve.severdija@gmail.com" aria-label="Email">
                <i class="fa-solid fa-envelope"></i>
            </a>
        </div>
    </footer>

</body>
</html>
