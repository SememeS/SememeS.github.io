
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card</title>
    <!-- FontAwesome for GitHub and Mail icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0c0c0c; /* Nearly black */
            --line-color: rgba(255, 255, 255, 0.15); /* Thin, low opacity white line */
            --icon-color: rgba(255, 255, 255, 0.6);
            --icon-hover: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents scrollbars from appearing */
        }

        /* Center section holding the QR Code */
        .card-center {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* QR Code Watermark Styling */
        .qr-watermark {
            /* The provided API generates a black QR on a white background */
            /* invert(1) turns it into a white QR on a black background */
            filter: invert(1); 
            /* screen blend mode makes the black background completely transparent */
            mix-blend-mode: screen; 
            /* Matches the 4% white opacity of the previous kanji */
            opacity: 0.04; 
            
            user-select: none; /* Prevents accidental highlighting */
            pointer-events: none; /* Prevents dragging the image */
            
            /* Ensures it stays responsive on very small screens */
            max-width: 80vw;
            height: auto;
        }

        /* Bottom Footer Area */
        .card-footer {
            width: 100%;
            padding-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* The Divider Line */
        .divider {
            width: 80%;
            max-width: 500px;
            height: 1px;
            background-color: var(--line-color);
            margin-bottom: 30px;
        }

        /* Icon Container */
        .social-links {
            display: flex;
            gap: 50px;
        }

        /* Icon Styling and Animation */
        .social-links a {
            color: var(--icon-color);
            font-size: 28px;
            text-decoration: none;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .social-links a:hover {
            color: var(--icon-hover);
            transform: translateY(-4px); /* Slight lift effect on hover */
        }
    </style>
</head>
<body>

    <main class="card-center">
        <!-- Transparent, low-opacity QR Code -->
        <img class="qr-watermark" src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://steveseverdija.com&format=svg" alt="Steve Severdija QR Code" width="250" height="250" />
    </main>

    <footer class="card-footer">
        <div class="divider"></div>
        <div class="social-links">
            <a href="https://github.com/steveseverdija" target="_blank" aria-label="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="mailto:steve.severdija@gmail.com" aria-label="Email">
                <i class="fa-solid fa-envelope"></i>
            </a>
        </div>
    </footer>

</body>
</html>
